name: Build (Windows)

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]        # пуш тега вида v1.0.0 → собрать и опубликовать Release
  pull_request:
  workflow_dispatch:

permissions:
  contents: write          # нужно, чтобы workflow мог создать Release

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'
          cache: maven

      - name: Install WiX Toolset (needed by jpackage for .msi)
        run: choco install wixtoolset --no-progress -y

      # Версия установщика: из тега (v1.2.3 → 1.2.3), иначе 1.0.0.
      - name: Determine version
        id: ver
        shell: pwsh
        run: |
          if ($env:GITHUB_REF -like 'refs/tags/v*') {
            $v = $env:GITHUB_REF -replace 'refs/tags/v', ''
          } else {
            $v = '1.0.0'
          }
          "version=$v" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          Write-Host "App version: $v"

      - name: Build custom runtime image (jlink)
        run: mvn -B clean javafx:jlink

      # jpackage берёт уже собранный jlink-образ (target/MultiTableMax),
      # в котором лежит наш модуль и JavaFX — поэтому WiX делает .msi без отдельной JRE.
      - name: Package Windows installer (jpackage .msi)
        run: >
          jpackage
          --type msi
          --name MultiTableMax
          --app-version ${{ steps.ver.outputs.version }}
          --vendor "MultiTableMax"
          --runtime-image target/MultiTableMax
          --module com.multitablemax/com.multitablemax.Launcher
          --dest target/dist
          --win-dir-chooser
          --win-menu
          --win-shortcut

      - name: Upload .msi installer (artifact)
        uses: actions/upload-artifact@v4
        with:
          name: MultiTableMax-windows-installer
          path: target/dist/*.msi
          if-no-files-found: error

      # Только при пуше тега v* — создаём (или обновляем) Release и прикрепляем .msi.
      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          name: MultiTableMax ${{ steps.ver.outputs.version }}
          generate_release_notes: true
          files: target/dist/*.msi
